<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Station</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0f1117;
      color: #e8eaf0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr 28vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #1e2333;
    }

    header h1 {
      font-size: 0.85rem;
      font-weight: 500;
      color: #8891a8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #updated {
      font-size: 0.8rem;
      color: #555d72;
    }

    #status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3a6b45;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    #status-dot.error { background: #6b2d3a; }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem 1rem;
      min-height: 0;
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1.5rem;
      background: #181c27;
      border: 1px solid #252a38;
      border-radius: 12px;
      min-height: 0;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(3, 1fr);
      gap: 0.75rem;
      min-height: 0;
    }

    #temp {
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 200;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    #temp sup {
      font-size: 0.3em;
      color: #8891a8;
      vertical-align: super;
    }

    .hero-conditions {
      margin-top: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .hero-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #1e2333;
      padding-bottom: 0.4rem;
    }

    .hero-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .hero-label {
      font-size: clamp(0.75rem, 1.2vw, 1.1rem);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #555d72;
    }

    .hero-val {
      font-size: clamp(1rem, 2vw, 1.6rem);
      font-weight: 300;
      color: #c8cdd8;
    }

    .card {
      background: #181c27;
      border: 1px solid #252a38;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
    }

    .card-label {
      font-size: clamp(0.75rem, 1.2vw, 1.1rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555d72;
    }

    .card-value {
      font-size: clamp(2.5rem, 5.5vw, 5rem);
      font-weight: 200;
      color: #e8eaf0;
      line-height: 1;
    }

    .card-unit {
      font-size: 0.45em;
      color: #8891a8;
      margin-left: 0.2em;
    }

    .card-sub {
      font-size: clamp(0.8rem, 1.2vw, 1rem);
      color: #555d72;
    }

    .error-box {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a1820;
      border: 1px solid #6b2d3a;
      border-radius: 12px;
      color: #e07080;
      font-size: 0.9rem;
    }

    #chart-section {
      padding: 0 1.5rem 0.75rem;
      min-height: 0;
    }

    #chart-wrap {
      background: #181c27;
      border: 1px solid #252a38;
      border-radius: 12px;
      padding: 0.75rem 1.25rem;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #chart-title {
      font-size: clamp(0.65rem, 1vw, 0.85rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555d72;
      margin-bottom: 0.4rem;
    }

    #chart-wrap canvas {
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body>

<header>
  <h1><span id="status-dot"></span><span id="station-name">Weather Station</span></h1>
  <div id="updated">Loading…</div>
</header>

<main id="main"></main>

<section id="chart-section">
  <div id="chart-wrap">
    <div id="chart-title">Temperature — Last 24 Hours</div>
    <canvas id="temp-chart"></canvas>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
  const REFRESH_MS = 60_000;

  function compassDir(deg) {
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg / 22.5) % 16];
  }

  function feelsLike(w) {
    return w.temp_f >= 80
      ? `${w.heat_index_f}°F`
      : `${w.wind_chill_f}°F`;
  }

  function card(label, value, unit, sub) {
    return `
      <div class="card">
        <div class="card-label">${label}</div>
        <div class="card-value">${value}<span class="card-unit">${unit}</span></div>
        ${sub ? `<div class="card-sub">${sub}</div>` : '<div></div>'}
      </div>`;
  }

  function render(w) {
    document.getElementById('station-name').textContent =
      `${w.station_id} — ${w.location}`;
    document.title = `Weather — ${w.station_id}`;
    document.getElementById('updated').textContent =
      'Updated ' + new Date(w.time_utc).toLocaleTimeString();
    document.getElementById('status-dot').className = '';

    document.getElementById('main').innerHTML = `
      <div class="hero">
        <div id="temp">${w.temp_f}<sup>°F</sup></div>
        <div class="hero-conditions">
          <div class="hero-row">
            <span class="hero-label">Feels like</span>
            <span class="hero-val">${feelsLike(w)}</span>
          </div>
          <div class="hero-row">
            <span class="hero-label">Humidity</span>
            <span class="hero-val">${w.humidity}%</span>
          </div>
          <div class="hero-row">
            <span class="hero-label">Dew Point</span>
            <span class="hero-val">${w.dew_point_f}°F</span>
          </div>
          <div class="hero-row">
            <span class="hero-label">Wind</span>
            <span class="hero-val">${compassDir(w.wind_dir_deg)} ${w.wind_speed_mph} mph</span>
          </div>
        </div>
      </div>
      <div class="cards">
        ${card('Wind Gust', w.wind_gust_mph, 'mph', `${compassDir(w.wind_dir_deg)} — ${w.wind_dir_deg}°`)}
        ${card('Pressure', w.pressure_inhg, 'inHg', '')}
        ${card('UV Index', w.uv_index, '', '')}
        ${card('Solar Radiation', w.solar_radiation, 'W/m²', '')}
        ${card('Rain Rate', w.precip_rate_in, 'in/hr', `Today: ${w.precip_total_in} in`)}
        ${card('Heat Index', w.heat_index_f, '°F', '')}
      </div>
    `;
  }

  function renderError(msg) {
    document.getElementById('status-dot').className = 'error';
    document.getElementById('main').innerHTML =
      `<div class="error-box">Could not load weather data: ${msg}</div>`;
  }

  async function refresh() {
    try {
      const res = await fetch('weather.php');
      const json = await res.json();
      const data = Array.isArray(json) ? json[0] : json;
      if (data.error) throw new Error(data.error);
      render(data);
    } catch(e) {
      renderError(e.message);
    }
  }

  refresh();
  setInterval(refresh, REFRESH_MS);

  // --- temperature chart ---
  const ctx = document.getElementById('temp-chart').getContext('2d');
  const tempChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{
      data: [],
      borderColor: '#5b8dee',
      backgroundColor: 'rgba(91,141,238,0.08)',
      borderWidth: 2,
      pointRadius: 3,
      pointBackgroundColor: '#5b8dee',
      fill: true,
      tension: 0.3,
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.y}°F`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#555d72', maxTicksLimit: 12, font: { size: 11 } },
          grid: { color: '#1e2333' },
        },
        y: {
          ticks: { color: '#555d72', callback: v => `${v}°`, font: { size: 11 } },
          grid: { color: '#1e2333' },
        }
      }
    }
  });

  async function refreshChart() {
    try {
      const res = await fetch('history.php');
      const data = await res.json();
      if (data.error || !Array.isArray(data)) return;
      tempChart.data.labels = data.map(d => {
        const t = new Date(d.time);
        return t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      });
      tempChart.data.datasets[0].data = data.map(d => d.temp);
      tempChart.update();
    } catch(e) { /* silently fail — chart just won't update */ }
  }

  refreshChart();
  setInterval(refreshChart, 10 * 60 * 1000); // every 10 min
</script>

</body>
</html>
